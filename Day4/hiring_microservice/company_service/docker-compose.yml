version: "3.9"

services:

  db:
    image: postgres:15
    container_name: company-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: companydb
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  company_service:
    build: .
    container_name: company-service
    restart: always
    depends_on:
      - db
    ports:
      - "8002:8000"
    env_file:
      - .env.docker

volumes:
  postgres_data: